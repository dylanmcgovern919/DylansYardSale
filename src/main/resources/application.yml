spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/dylans_yard_sale?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none 
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html

# OpenAPI metadata displayed in Swagger UI (title/version/description)
info:
  #  this sets the Swagger page title text
  title: Dylan's Yard Sale

  version: 1.0.0

  description: API for Dylan's Yard Sale
